apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deployment-api.fullname" . }}
  labels:
    app: {{ include "deployment-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "deployment-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "deployment-api.name" . }}
    spec:
      serviceAccountName: {{ include "deployment-api.serviceAccountName" . }}
      containers:
        - name: {{ include "deployment-api.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}